version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - '.next/cache/**/*'
backend:
  phases:
    build:
      commands:
        - echo "Backend is deployed via Amplify Gen 2"
env:
  variables:
    NEXT_PUBLIC_AWS_REGION: us-east-1
    NEXT_PUBLIC_APPSYNC_REGION: us-east-1
    NEXT_PUBLIC_APPSYNC_AUTHENTICATION_TYPE: AMAZON_COGNITO_USER_POOLS
